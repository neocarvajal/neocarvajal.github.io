name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v4
      - run: npm ci
      - run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dntsjosaqsskukgjdlca.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_0mVFGGA6MiBvxaSLpqltGw_N7jdR1og
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
